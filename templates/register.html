{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm p-4 mt-3">
            <h3 class="mb-1 fw-bold">Create Account</h3>
            <p class="text-muted small mb-4">Join NewCommerce as a customer</p>
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-2">Register</button>
            </form>
            <hr>
            <p class="text-center small mb-0">
                Already have an account? <a href="{% url 'signin' %}">Sign In</a>
            </p>
            <p class="text-center small">
                Want to sell? <a href="{% url 'sellar_register' %}">Register as Seller</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
