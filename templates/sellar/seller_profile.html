{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}My Store Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm p-4">
            <div class="d-flex align-items-center mb-3">
                <a href="{% url 'display_products' %}" class="btn btn-outline-secondary btn-sm me-3">← Back</a>
                <h4 class="fw-bold mb-0">🏪 My Store Profile</h4>
            </div>

            <div class="mb-3">
                <span class="badge
                    {% if seller.approval_status == 'approved' %}bg-success
                    {% elif seller.approval_status == 'rejected' %}bg-danger
                    {% else %}bg-warning text-dark{% endif %}">
                    Approval: {{ seller.approval_status|title }}
                </span>
            </div>

            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-success">Save Profile</button>
                    <a href="{% url 'display_products' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
