{% extends 'base.html'%}
{%load static%}


{% block title %}Sellar Register{% endblock %}

{% block content %}
<style>
    @import url("{% static 'css/sellar_register.css' %}");
</style>

{% if form.errors %}
    <p style="color:red;">Please correct the errors below.</p>
{% endif %}

{%load crispy_forms_tags%}
<form method="POST" class="sellar-register-form">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" >Register</button>
</form>
{% endblock %}
